name: Build and Release Installers

on:
  push:
    tags:
      - 'v*' # Trigger automatically when you push a tag like "v1.0.0"

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows Installers
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 24
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '24'

      - name: Grant Execute Permission for Gradle
        run: chmod +x gradlew
        shell: bash

      - name: Build Windows Executable (.exe) and Installer (.msi)
        run: ./gradlew :composeApp:packageReleaseExe :composeApp:packageReleaseMsi
        shell: bash

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            composeApp/build/compose/binaries/main-release/exe/*.exe
            composeApp/build/compose/binaries/main-release/msi/*.msi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-linux:
    name: Build Linux Installers
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 24
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '24'

      - name: Grant Execute Permission for Gradle
        run: chmod +x gradlew

      - name: Install fakeroot and dpkg
        run: sudo apt-get update && sudo apt-get install -y fakeroot dpkg rpm

      - name: Build Linux Packages (.deb and .rpm)
        run: ./gradlew :composeApp:packageReleaseDeb :composeApp:packageReleaseRpm

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            composeApp/build/compose/binaries/main-release/deb/*.deb
            composeApp/build/compose/binaries/main-release/rpm/*.rpm
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-macos:
    name: Build macOS Installer
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 24
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '24'

      - name: Grant Execute Permission for Gradle
        run: chmod +x gradlew

      - name: Build macOS Installer (.dmg)
        run: ./gradlew :composeApp:packageReleaseDmg

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            composeApp/build/compose/binaries/main-release/dmg/*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
