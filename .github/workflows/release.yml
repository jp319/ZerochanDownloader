name: Build and Release Installers

on:
  push:
    tags:
      - 'v*' # Trigger automatically when pushing a tag like "v1.0.0"

permissions:
  contents: write

# Avoid duplicate release runs for the same ref.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare:
    name: Prepare Release Metadata
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{ steps.vars.outputs.tag_name }}
      app_version: ${{ steps.vars.outputs.app_version }}
    steps:
      - name: Compute tag and app version
        id: vars
        shell: bash
        run: |
          echo "tag_name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          echo "app_version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

  build-windows:
    name: Build Windows Installers
    runs-on: windows-latest
    needs: prepare
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Setup Java 24
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '24'

      - name: Setup Gradle Cache
        uses: gradle/actions/setup-gradle@v4

      - name: Grant Execute Permission for Gradle
        run: chmod +x gradlew
        shell: bash

      - name: Build Windows Executable (.exe) and Installer (.msi)
        run: ./gradlew -PappVersion=${{ needs.prepare.outputs.app_version }} :composeApp:packageReleaseExe :composeApp:packageReleaseMsi
        shell: bash

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            composeApp/build/compose/binaries/main-release/exe/*.exe
            composeApp/build/compose/binaries/main-release/msi/*.msi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-linux:
    name: Build Linux Installers
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Setup Java 24
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '24'

      - name: Setup Gradle Cache
        uses: gradle/actions/setup-gradle@v4

      - name: Grant Execute Permission for Gradle
        run: chmod +x gradlew

      - name: Install fakeroot and dpkg
        run: sudo apt-get update && sudo apt-get install -y fakeroot dpkg rpm

      - name: Build Linux Packages (.deb and .rpm)
        run: ./gradlew -PappVersion=${{ needs.prepare.outputs.app_version }} :composeApp:packageReleaseDeb :composeApp:packageReleaseRpm

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            composeApp/build/compose/binaries/main-release/deb/*.deb
            composeApp/build/compose/binaries/main-release/rpm/*.rpm
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-aur:
    name: Sync to AUR
    needs: [prepare, build-linux]
    uses: ./.github/workflows/aur-publish.yml
    with:
      version: ${{ needs.prepare.outputs.app_version }}
    secrets:
      AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}

  build-macos:
    name: Build macOS Installer
    runs-on: macos-latest
    needs: prepare
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Setup Java 24
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '24'

      - name: Setup Gradle Cache
        uses: gradle/actions/setup-gradle@v4

      - name: Grant Execute Permission for Gradle
        run: chmod +x gradlew

      - name: Build macOS Installer (.dmg)
        run: ./gradlew -PappVersion=${{ needs.prepare.outputs.app_version }} :composeApp:packageReleaseDmg

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            composeApp/build/compose/binaries/main-release/dmg/*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}