name: Build and Release Installers

on:
  push:
    tags:
      - 'v*' # Trigger automatically when you push a tag like "v1.0.0"

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows Installers
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 24
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '24'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Extract Version
        shell: bash
        run: |
          VERSION="${{ github.ref_name }}"
          echo "APP_VERSION=${VERSION#v}" >> $GITHUB_ENV

      - name: Build Windows Executable (.exe) and Installer (.msi)
        # Passing the version to Gradle via -PappVersion
        run: ./gradlew :composeApp:packageReleaseExe :composeApp:packageReleaseMsi -PappVersion=${{ env.APP_VERSION }} --no-daemon --build-cache
        shell: bash

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            composeApp/build/compose/binaries/main-release/exe/*.exe
            composeApp/build/compose/binaries/main-release/msi/*.msi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-linux:
    name: Build Linux Installers
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 24
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '24'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Extract Version
        shell: bash
        run: |
          VERSION="${{ github.ref_name }}"
          echo "APP_VERSION=${VERSION#v}" >> $GITHUB_ENV

      - name: Install fakeroot and dpkg
        run: sudo apt-get update && sudo apt-get install -y fakeroot dpkg rpm

      - name: Build Linux Packages (.deb and .rpm)
        # Passing the version to Gradle via -PappVersion
        run: ./gradlew :composeApp:packageReleaseDeb :composeApp:packageReleaseRpm -PappVersion=${{ env.APP_VERSION }} --no-daemon --build-cache

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            composeApp/build/compose/binaries/main-release/deb/*.deb
            composeApp/build/compose/binaries/main-release/rpm/*.rpm
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-aur:
    name: Sync to AUR
    needs: build-linux
    uses: ./.github/workflows/aur-publish.yml
    with:
      version: ${{ github.ref_name }} # e.g. v1.0.1
    secrets:
      AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}

  build-macos:
    name: Build macOS Installer
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 24
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '24'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Extract Version
        shell: bash
        run: |
          VERSION="${{ github.ref_name }}"
          echo "APP_VERSION=${VERSION#v}" >> $GITHUB_ENV

      - name: Build macOS Installer (.dmg)
        # Passing the version to Gradle via -PappVersion
        run: ./gradlew :composeApp:packageReleaseDmg -PappVersion=${{ env.APP_VERSION }} --no-daemon --build-cache

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            composeApp/build/compose/binaries/main-release/dmg/*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
