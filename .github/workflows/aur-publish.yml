name: Publish to AUR

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string
    secrets:
      AUR_SSH_PRIVATE_KEY:
        required: true

permissions:
  contents: read

jobs:
  update-aur:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Extract Version
        run: |
          # workflow_call requires version input; support both "v1.2.3" and "1.2.3".
          INPUT_VER="${{ inputs.version }}"
          VERSION="${INPUT_VER#v}"

          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "Version is $VERSION"

      - name: Download release .deb and calculate SHA256
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG_NAME="v$VERSION"

          echo "Downloading .deb file for release: $TAG_NAME"
          gh release download "$TAG_NAME" --repo "${{ github.repository }}" --pattern "*.deb"

          DEB_FILE=$(ls -1 *.deb | head -n 1)
          if [ -z "$DEB_FILE" ]; then
            echo "Error: Could not find the downloaded .deb file."
            exit 1
          fi

          SHA256=$(sha256sum "$DEB_FILE" | awk '{print $1}')
          echo "SHA256=$SHA256" >> "$GITHUB_ENV"

          echo "Using release asset: $DEB_FILE"
          echo "Calculated SHA256: $SHA256"

      - name: Prepare generated PKGBUILD
        run: |
          if [ ! -f aur/PKGBUILD ]; then
            echo "Error: Missing aur/PKGBUILD template in repository."
            exit 1
          fi

          cp aur/PKGBUILD PKGBUILD
          sed -i "s/VERSION_PLACEHOLDER/${VERSION}/g" PKGBUILD
          sed -i "s/SHA256_PLACEHOLDER/${SHA256}/g" PKGBUILD

          # Ensure placeholders are fully replaced before publishing.
          if grep -q "VERSION_PLACEHOLDER\|SHA256_PLACEHOLDER" PKGBUILD; then
            echo "Error: PKGBUILD placeholders were not replaced."
            exit 1
          fi

      - name: Publish to AUR
        uses: KSXGitHub/github-actions-deploy-aur@v4.1.1
        with:
          pkgname: zerochan-downloader-bin
          pkgbuild: ./PKGBUILD
          commit_username: github-actions[bot]
          commit_email: github-actions[bot]@users.noreply.github.com
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: Automated update to v${{ env.VERSION }}
          allow_empty_commits: "false"
          ssh_keyscan_types: rsa,ecdsa,ed25519
